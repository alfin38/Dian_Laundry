<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 20px Arial, sans-serif; fill: #111827; }
    .entity { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
    .process { fill: #f9fafb; stroke: #1f2937; stroke-width: 2; }
    .label { font: 13px Arial, sans-serif; fill: #111827; }
    .flow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>

  <text class="title" x="40" y="40">DFD Level 0 - Context Diagram</text>

  <!-- External Entities -->
  <rect class="entity" x="60" y="140" width="240" height="90"/>
  <text class="label" x="95" y="190">Admin/Karyawan</text>

  <rect class="entity" x="60" y="540" width="240" height="90"/>
  <text class="label" x="120" y="590">Pelanggan</text>

  <rect class="entity" x="1100" y="340" width="240" height="90"/>
  <text class="label" x="1165" y="390">Midtrans</text>

  <!-- System Process -->
  <ellipse class="process" cx="700" cy="385" rx="180" ry="95"/>
  <text class="label" x="630" y="390">Laundry App System</text>

  <!-- Flows (non-overlapping) -->
  <path class="flow" d="M 300 175 L 520 320"/>
  <path class="flow" d="M 520 350 L 300 210"/>

  <path class="flow" d="M 300 585 L 520 450"/>
  <path class="flow" d="M 520 420 L 300 555"/>

  <path class="flow" d="M 880 360 L 1100 370"/>
  <path class="flow" d="M 1100 410 L 880 405"/>
</svg>
