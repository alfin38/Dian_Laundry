  <rect class="entity" x="40" y="720" width="240" height="80"/>
  <text class="label" x="95" y="770">Pelanggan</text>

  <rect class="entity" x="1320" y="420" width="240" height="80"/>
  <text class="label" x="1390" y="470">Midtrans</text>dfd

  <!-- Data Stores -->
  <rect class="store" x="1220" y="140" width="260" height="70"/>
  <line x1="1240" y1="140" x2="1240" y2="210" stroke="#1f2937" stroke-width="2"/>
  <text class="label" x="1265" y="185">D2 Pakets</text>

