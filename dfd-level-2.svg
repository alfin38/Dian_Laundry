<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 20px Arial, sans-serif; fill: #111827; }
    .entity { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
    .process { fill: #f9fafb; stroke: #1f2937; stroke-width: 2; }
    .store { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
    .label { font: 13px Arial, sans-serif; fill: #111827; }
    .flow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>

  <text class="title" x="40" y="40">DFD Level 2 - Order &amp; Payment</text>

  <!-- External Entities -->
  <rect class="entity" x="40" y="160" width="240" height="80"/>
