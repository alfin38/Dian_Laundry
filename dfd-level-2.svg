  <path class="flow" d="M 280 200 L 385 170"/>
  <path class="flow" d="M 280 760 L 385 700"/>

  <path class="flow" d="M 655 170 L 1220 175"/>
  <path class="flow" d="M 655 300 L 1220 175"/>

