  <ellipse class="process" cx="520" cy="300" rx="135" ry="55"/>
  <text class="label" x="450" y="305">3.2 Validate &amp; Calculate</text>

  <ellipse class="process" cx="520" cy="430" rx="135" ry="55"/>
